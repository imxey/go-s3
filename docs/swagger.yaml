basePath: /
host: https://s3.pnj-digit.site
info:
  contact: {}
  description: API for uploading and downloading files from an S3-compatible bucket.
  title: go-api-s3
  version: "1.0"
paths:
  /:
    get:
      description: Returns service health and basic status information.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /get:
    get:
      description: Downloads a file from the configured S3 bucket using folder and
        file query parameters.
      parameters:
      - description: Folder inside the bucket
        in: query
        name: folder
        required: true
        type: string
      - description: File name to download
        in: query
        name: file
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "405":
          description: Method Not Allowed
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Download file from S3
      tags:
      - files
  /send:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a single file to the configured S3 bucket under the provided
        folder.
      parameters:
      - description: Target folder inside the bucket
        in: formData
        name: folder
        required: true
        type: string
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "405":
          description: Method Not Allowed
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Upload file to S3
      tags:
      - files
swagger: "2.0"
